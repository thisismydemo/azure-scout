area: "AI governance & security"
framework: CAF
weight: 1.0
rules:
  - id: CAF-AI-01
    title: "Cognitive / OpenAI accounts disable public network access"
    severity: high
    query: "$.domains.ai.cognitiveAccounts[?(@.publicAccess == 'Enabled')]"
    assert: { type: countEquals, value: 0 }
    remediation: "Set publicNetworkAccess to Disabled and use private endpoints for AI services."
    manual: false
  - id: CAF-AI-02
    title: "Responsible-AI / content-filtering posture reviewed"
    severity: medium
    query: null
    assert: { type: manual }
    remediation: "Confirm content filtering and responsible-AI controls are configured on deployed models."
    manual: true
  - id: CAF-AI-03
    title: "Cognitive Services / Azure OpenAI accounts use managed identity, not API keys"
    severity: medium
    # collect.json's cognitiveAccounts producer projects only name/resourceGroup/
    # kind/publicAccess (Invoke-Collect.ps1) — no identity/authOptions field yet.
    query: null
    assert: { type: manual }
    remediation: "Confirm consuming applications authenticate via managed identity + Entra ID rather than account API keys stored in app config; extend the cognitiveAccounts collector with the identity block before automating."
    manual: true
  - id: CAF-AI-04
    title: "Private endpoint adoption for AI Foundry / OpenAI resources"
    severity: high
    # networking.privateEndpoints only projects name/resourceGroup/subscriptionId —
    # no target-resource linkage, so it can't be joined to a specific AI account.
    query: null
    assert: { type: manual }
    remediation: "Confirm each Cognitive Services/Azure OpenAI/AI Foundry account has a dedicated private endpoint (publicNetworkAccess=Disabled alone is not sufficient evidence); extend the privateEndpoints collector to project the target resource ID before automating."
    manual: true
  - id: CAF-AI-05
    title: "Customer-managed key (CMK) encryption configured where required"
    severity: medium
    # collect.json's cognitiveAccounts producer does not project encryption/keySource.
    query: null
    assert: { type: manual }
    remediation: "Confirm accounts holding sensitive prompt/response data use customer-managed keys in Key Vault rather than platform-managed encryption; extend the cognitiveAccounts collector with properties.encryption before automating."
    manual: true
