area: "AI governance & security"
framework: CAF
weight: 1.0
rules:
  - id: CAF-AI-01
    title: "Cognitive / OpenAI accounts disable public network access"
    severity: high
    query: "$.domains.ai.cognitiveAccounts[?(@.publicAccess == 'Enabled')]"
    assert: { type: countEquals, value: 0 }
    remediation: "Set publicNetworkAccess to Disabled and use private endpoints for AI services."
    manual: false
  - id: CAF-AI-02
    title: "Responsible-AI / content-filtering posture reviewed"
    severity: medium
    query: null
    assert: { type: manual }
    remediation: "Confirm content filtering and responsible-AI controls are configured on deployed models."
    manual: true
  - id: CAF-AI-03
    title: "Cognitive Services / Azure OpenAI accounts use managed identity, not API keys"
    severity: medium
    # `identity` is a top-level Resource Graph column; Invoke-Collect.ps1 now
    # projects it as identityType (AB#5057). This confirms a managed identity
    # exists on the account — it cannot confirm consuming apps actually use it
    # instead of API keys, so treat a Pass as necessary, not sufficient.
    query: "$.domains.ai.cognitiveAccounts[?(@.identityType == '' || @.identityType == 'None')]"
    assert: { type: countEquals, value: 0 }
    remediation: "Confirm consuming applications authenticate via managed identity + Entra ID rather than account API keys stored in app config."
    manual: false
  - id: CAF-AI-04
    title: "Private endpoint adoption for AI Foundry / OpenAI resources"
    severity: high
    # networking.privateEndpoints now projects the linked-service target
    # (targetProvider/targetType, parsed from privateLinkServiceConnections ->
    # privateLinkServiceId) so PEs pointed at Cognitive Services accounts can be
    # counted without a full cross-table join (AB#5057).
    query: "$.networking.privateEndpoints[?(@.targetProvider == 'microsoft.cognitiveservices' && @.targetType == 'accounts')]"
    assert: { type: percentageAtLeast, value: 80, denominatorQuery: "$.domains.ai.cognitiveAccounts[*]" }
    remediation: "Confirm each Cognitive Services/Azure OpenAI/AI Foundry account has a dedicated private endpoint (publicNetworkAccess=Disabled alone is not sufficient evidence)."
    manual: false
  - id: CAF-AI-05
    title: "Customer-managed key (CMK) encryption configured where required"
    severity: medium
    # properties.encryption.keySource is now projected as cmkEnabled (AB#5057).
    query: "$.domains.ai.cognitiveAccounts[?(@.cmkEnabled == false)]"
    assert: { type: countEquals, value: 0 }
    remediation: "Confirm accounts holding sensitive prompt/response data use customer-managed keys in Key Vault rather than platform-managed encryption."
    manual: false
