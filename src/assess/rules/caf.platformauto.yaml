area: "Platform automation & DevOps"
framework: CAF
weight: 1.0
rules:
  - id: CAF-AUT-01
    title: "Infrastructure managed as code (IaC deployments present)"
    severity: medium
    query: "$.management.deployments[?(@.properties.templateHash)]"
    assert: { type: exists }
    remediation: "Deploy landing-zone resources via Bicep/Terraform pipelines, not the portal."
    manual: false

  - id: CAF-AUT-02
    title: "Policy-as-code / DINE assignments deploy configuration"
    severity: low
    query: "$.governance.policyAssignments[?(@.properties.parameters)]"
    assert: { type: exists }
    remediation: "Use DeployIfNotExists policies to enforce platform configuration automatically."
    manual: false

  - id: CAF-AUT-03
    title: "CI/CD release process documented"
    severity: low
    query: null
    assert: { type: manual }
    remediation: "Confirm platform changes flow through a reviewed CI/CD release process."
    manual: true

  - id: CAF-AUT-04
    title: "Majority of resource groups show IaC-managed deployments"
    severity: medium
    query: "$.management.deployments[?(@.properties.templateHash)]"
    assert: { type: percentageAtLeast, value: 70, denominatorQuery: "$.management.deployments[*]" }
    remediation: "Increase the proportion of deployments driven by Bicep/Terraform pipelines rather than ad hoc portal changes; target at least 70% IaC-managed."
    manual: false

  - id: CAF-AUT-05
    title: "Resource naming follows a documented convention"
    severity: low
    query: null
    assert: { type: manual }
    remediation: "Confirm resource and resource-group names follow the CAF naming convention (resourceType-workload-env-region-instance). collect.json does not currently capture a naming-pattern signal to automate this check."
    manual: true

  - id: CAF-AUT-06
    title: "Automated pipelines enforce policy/security gates before promotion"
    severity: medium
    query: null
    assert: { type: manual }
    remediation: "Confirm CI/CD pipelines run policy-compliance and security-scanning gates before production promotion. Pipeline/build definitions are not currently collected by collect.json."
    manual: true
