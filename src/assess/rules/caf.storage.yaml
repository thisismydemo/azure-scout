area: "Storage security & protection"
framework: CAF
weight: 1.0
rules:
  - id: CAF-STO-01
    title: "Storage accounts disable public blob access"
    severity: high
    query: "$.domains.storage.storageAccounts[?(@.publicAccess == true)]"
    assert: { type: countEquals, value: 0 }
    remediation: "Disable allowBlobPublicAccess on storage accounts; use private endpoints or SAS."
    manual: false
  - id: CAF-STO-02
    title: "Storage accounts enforce HTTPS-only traffic"
    severity: high
    query: "$.domains.storage.storageAccounts[?(@.httpsOnly == false)]"
    assert: { type: countEquals, value: 0 }
    remediation: "Enable supportsHttpsTrafficOnly on all storage accounts."
    manual: false
  - id: CAF-STO-03
    title: "Storage accounts require TLS 1.2 minimum"
    severity: medium
    query: "$.domains.storage.storageAccounts[?(@.minTls == 'TLS1_0' || @.minTls == 'TLS1_1')]"
    assert: { type: countEquals, value: 0 }
    remediation: "Set minimumTlsVersion to TLS1_2 on all storage accounts."
    manual: false
  - id: CAF-STO-04
    title: "Storage accounts enable blob soft delete or versioning"
    severity: medium
    query: null
    assert: { type: manual }
    remediation: "Enable blob soft delete and/or blob versioning (deleteRetentionPolicy, isVersioningEnabled) to protect against accidental or malicious deletion. collect.json does not yet capture these properties (SKU redundancy is already covered by WAF-STO-01) — verify via `az storage account blob-service-properties show`."
    manual: true
  - id: CAF-STO-05
    title: "Storage account network rules default-deny with explicit allow-list"
    severity: high
    # properties.networkAcls.defaultAction is on the storage account resource
    # itself, so Invoke-Collect.ps1 now projects it as networkDefaultDeny (AB#5057).
    query: "$.domains.storage.storageAccounts[?(@.networkDefaultDeny == false)]"
    assert: { type: countEquals, value: 0 }
    remediation: "Set networkAcls.defaultAction to Deny and add explicit VNet/IP allow rules or private endpoints."
    manual: false
  - id: CAF-STO-06
    title: "Immutability policies applied to compliance-sensitive containers"
    severity: low
    query: null
    assert: { type: manual }
    remediation: "Apply time-based retention or legal hold immutability policies to containers holding regulated or audit-sensitive data. collect.json does not yet capture immutability policy state — verify via `az storage container immutability-policy show`."
    manual: true
