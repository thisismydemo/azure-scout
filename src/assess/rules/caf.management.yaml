area: "Management & monitoring"
framework: CAF
weight: 1.0
rules:
  - id: CAF-MGT-01
    title: "Diagnostic settings coverage above threshold"
    severity: medium
    query: "$.opsPosture.diagnosticCoverage[?(@.coveragePct >= 80)]"
    assert: { type: exists }
    remediation: "Route diagnostics to a central Log Analytics workspace for at least 80% of resource types."
    manual: false

  - id: CAF-MGT-02
    title: "Recovery Services vault backup items present"
    severity: high
    query: "$.management.recoveryVaults[*].backupItems[*]"
    assert: { type: countGreaterThan, value: 0 }
    remediation: "Configure Azure Backup for stateful workloads."
    manual: false

  - id: CAF-MGT-03
    title: "Update management / patch baseline confirmed"
    severity: medium
    query: null
    assert: { type: manual }
    remediation: "Confirm a patch/update management baseline is applied across the estate."
    manual: true

  - id: CAF-MGT-04
    title: "Backup coverage across the VM estate meets minimum threshold"
    severity: high
    query: "$.management.recoveryVaults[*].backupItems[*]"
    assert: { type: percentageAtLeast, value: 80, denominatorQuery: "$.compute.virtualMachines[*]" }
    remediation: "Onboard remaining virtual machines to a Recovery Services vault backup policy until coverage reaches at least 80% of the compute estate."
    manual: false

  - id: CAF-MGT-05
    title: "No resource type left with zero diagnostic coverage"
    severity: high
    query: "$.opsPosture.diagnosticCoverage[?(@.coveragePct == 0)]"
    assert: { type: countEquals, value: 0 }
    remediation: "Every in-scope resource type should have at least partial diagnostic-settings coverage; a 0% type is a monitoring blind spot, not just below-threshold."
    manual: false

  - id: CAF-MGT-06
    title: "Log Analytics workspace retention meets the compliance minimum"
    severity: medium
    # Invoke-Collect.ps1 now queries microsoft.operationalinsights/workspaces
    # and projects properties.retentionInDays as management.logAnalyticsWorkspaces[]
    # (AB#5057). 90 days is the floor named in the remediation text below.
    query: "$.management.logAnalyticsWorkspaces[?(@.retentionInDays < 90)]"
    assert: { type: countEquals, value: 0 }
    remediation: "Confirm Log Analytics workspace retention (interactive + archive) meets the minimum required by the workload's compliance obligations, e.g. 90+ days for regulated data."
    manual: false
