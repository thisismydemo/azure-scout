area: "Analytics data governance"
framework: CAF
weight: 1.0
rules:
  - id: CAF-ANL-01
    title: "Synapse workspaces disable public network access"
    severity: high
    query: "$.domains.analytics.synapseWorkspaces[?(@.publicAccess == 'Enabled')]"
    assert: { type: countEquals, value: 0 }
    remediation: "Set publicNetworkAccess to Disabled and use managed private endpoints for Synapse."
    manual: false
  - id: CAF-ANL-02
    title: "Data governance (Purview) coverage confirmed"
    severity: medium
    query: null
    assert: { type: manual }
    remediation: "Confirm data estate is catalogued/classified in Microsoft Purview."
    manual: true
  - id: CAF-ANL-03
    title: "Synapse workspaces use a managed virtual network"
    severity: medium
    # properties.managedVirtualNetwork is a top-level workspace property, now
    # projected as managedVnetEnabled (AB#5057).
    query: "$.domains.analytics.synapseWorkspaces[?(@.managedVnetEnabled == false)]"
    assert: { type: countEquals, value: 0 }
    remediation: "Confirm workspaces are provisioned with a managed virtual network to isolate Spark pool / pipeline compute."
    manual: false
  - id: CAF-ANL-04
    title: "Data Factory / Synapse pipelines use private endpoints for linked services"
    severity: high
    # No ADF/Synapse-pipeline collector exists in collect.json today.
    query: null
    assert: { type: manual }
    remediation: "Confirm pipeline linked services (storage, SQL, Key Vault) connect via managed private endpoints rather than public endpoints; add a Data Factory/Synapse linked-service collector before automating."
    manual: true
  - id: CAF-ANL-05
    title: "Synapse workspace firewall rules are scoped, not AllowAll"
    severity: medium
    # collect.json's synapseWorkspaces producer does not project firewallRules.
    query: null
    assert: { type: manual }
    remediation: "Confirm workspace IP firewall rules do not include a 0.0.0.0-255.255.255.255 AllowAll entry and are scoped to known ranges; extend the synapseWorkspaces collector with the firewallRules child resource before automating."
    manual: true
