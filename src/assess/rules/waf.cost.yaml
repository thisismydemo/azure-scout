area: "Cost optimization"
framework: WAF
weight: 1.0
rules:
  - id: WAF-CO-01
    title: "No orphaned disks accumulating cost"
    severity: medium
    query: "$.costCleanup.orphanedDisks[*]"
    assert: { type: countEquals, value: 0 }
    remediation: "Remove unattached managed disks."
    manual: false

  - id: WAF-CO-02
    title: "Advisor cost recommendations addressed"
    severity: medium
    query: "$.advisor[?(@.Category == 'Cost' && @.Impact == 'High')]"
    assert: { type: countEquals, value: 0 }
    remediation: "Act on high-impact Advisor cost recommendations (right-size, reserved instances)."
    manual: false

  - id: WAF-CO-03
    title: "Budgets with alerts in place"
    severity: low
    query: "$.governance.budgets[*]"
    assert: { type: countGreaterThan, value: 0 }
    remediation: "Define Cost Management budgets with threshold alerts."
    manual: false

  - id: WAF-CO-04
    title: "No orphaned public IP addresses accumulating cost"
    severity: low
    query: "$.costCleanup.orphanedPips[*]"
    assert: { type: countEquals, value: 0 }
    remediation: "Release public IPs with no attached IP configuration."
    manual: false

  - id: WAF-CO-05
    title: "Reserved Instance / Savings Plan coverage reviewed"
    severity: medium
    query: null
    assert: { type: manual }
    remediation: "Confirm steady-state compute/database workloads are covered by Reserved Instances or Savings Plans. collect.json has no RI/Savings Plan coverage collector yet."
    manual: true

  - id: WAF-CO-06
    title: "Medium-impact Advisor cost recommendations addressed (right-sizing, idle resources)"
    severity: low
    query: "$.advisor[?(@.Category == 'Cost' && @.Impact == 'Medium')]"
    assert: { type: countEquals, value: 0 }
    remediation: "Act on medium-impact Advisor cost recommendations, including VM/database right-sizing and idle-resource guidance."
    manual: false
