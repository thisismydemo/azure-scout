area: "Identity & access management"
framework: CAF
weight: 1.0
rules:
  - id: CAF-IDN-01
    title: "Role assignments use groups, not individual users, at scale"
    severity: medium
    query: "$.governance.roleAssignments[?(@.properties.principalType == 'User')]"
    assert: { type: countLessThan, value: 50 }
    remediation: "Prefer Entra ID groups over direct user role assignments for manageability."
    manual: false

  - id: CAF-IDN-02
    title: "Privileged Identity Management (PIM) eligibility in use"
    severity: high
    query: "$.governance.pimEligibility[*]"
    assert: { type: exists }
    remediation: "Adopt PIM eligible assignments for privileged roles instead of permanent grants."
    manual: false

  - id: CAF-IDN-03
    title: "No classic subscription administrators remain"
    severity: high
    query: "$.governance.classicAdministrators[*]"
    assert: { type: notExists }
    remediation: "Remove classic co-administrators; use Azure RBAC exclusively."
    manual: false

  - id: CAF-IDN-04
    title: "Conditional Access baseline reviewed"
    severity: medium
    query: null
    assert: { type: manual }
    remediation: "Confirm a Conditional Access baseline (MFA, device compliance) is defined and enforced."
    manual: true

  - id: CAF-IDN-05
    title: "Majority of privileged role assignments are PIM-eligible rather than standing"
    severity: medium
    query: "$.governance.pimEligibility[*]"
    assert: { type: percentageAtLeast, value: 50, denominatorQuery: "$.governance.roleAssignments[?(@.properties.principalType == 'User')]" }
    remediation: "Convert standing (permanent) privileged user role assignments to PIM-eligible, time-bound assignments; target at least half of privileged user access as eligible rather than always-on."
    manual: false

  - id: CAF-IDN-06
    title: "Stale privileged role assignments reviewed and removed"
    severity: medium
    query: null
    assert: { type: manual }
    remediation: "Periodically review privileged role assignments for principals who changed roles or left the organization, and remove stale grants. Assignment age / last-sign-in is not currently collected in collect.json — cross-check against Entra ID sign-in logs."
    manual: true

  - id: CAF-IDN-07
    title: "Guest (B2B) user access reviewed periodically"
    severity: medium
    query: null
    assert: { type: manual }
    remediation: "Confirm Entra ID access reviews are configured and run on a recurring cadence for guest users holding standing access. Guest enumeration via Microsoft Graph is not currently collected in collect.json."
    manual: true
