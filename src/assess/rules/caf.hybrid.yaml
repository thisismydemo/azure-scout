area: "Hybrid & Arc management"
framework: CAF
weight: 1.0
rules:
  - id: CAF-HYB-01
    title: "Arc-enabled servers are connected"
    severity: medium
    query: "$.domains.hybrid.arcServers[?(@.status != 'Connected')]"
    assert: { type: countEquals, value: 0 }
    remediation: "Investigate Arc servers not in Connected state (agent/network/identity)."
    manual: false
  - id: CAF-HYB-02
    title: "Arc footprint is present where hybrid is in scope"
    severity: low
    query: "$.domains.hybrid.arcServers[*]"
    assert: { type: exists }
    remediation: "Onboard hybrid/multicloud servers to Azure Arc for unified governance."
    manual: false
  - id: CAF-HYB-03
    title: "Arc agent version currency reviewed"
    severity: low
    query: null
    assert: { type: manual }
    remediation: "collect.json's domains.hybrid.arcServers[].agentVersion reports the Connected Machine agent version per server. Compare it against the current supported version in the Azure Arc agent release notes — the 'latest supported' threshold changes too often to hard-code as an automated assert — and flag any server materially behind."
    manual: true
  - id: CAF-HYB-04
    title: "Arc-enabled server extension coverage reviewed"
    severity: medium
    # Invoke-Collect.ps1 now queries microsoft.hybridcompute/machines/extensions
    # as domains.hybrid.arcExtensions[] (AB#5057). Automates the Azure Monitor
    # Agent piece of the baseline (the first extension named in the
    # remediation); Defender for Endpoint / Update Manager coverage still needs
    # a human look since agent naming varies by onboarding path.
    query: "$.domains.hybrid.arcExtensions[?(@.extensionType == 'AzureMonitorWindowsAgent' || @.extensionType == 'AzureMonitorLinuxAgent')]"
    assert: { type: percentageAtLeast, value: 80, denominatorQuery: "$.domains.hybrid.arcServers[*]" }
    remediation: "Confirm baseline extensions (Azure Monitor Agent, Microsoft Defender for Endpoint, Update Manager) are installed on Arc-connected servers."
    manual: false
  - id: CAF-HYB-05
    title: "Azure Local (Arc-enabled HCI) cluster health reviewed"
    severity: high
    # Invoke-Collect.ps1 now queries microsoft.azurestackhci/clusters and
    # projects properties.connectivityStatus (the documented cluster
    # connectivity enum) as domains.hybrid.azureLocalClusters[] (AB#5057).
    # This covers Arc connectivity only — storage/S2D health is not exposed by
    # the clusters resource and still needs a portal/CLI look.
    query: "$.domains.hybrid.azureLocalClusters[?(@.connectivityStatus != 'Connected')]"
    assert: { type: countEquals, value: 0 }
    remediation: "Investigate any Azure Local cluster not reporting Connected; review storage/S2D health in the portal separately."
    manual: false
  - id: CAF-HYB-06
    title: "Arc-scoped policy compliance reviewed"
    severity: medium
    query: null
    assert: { type: manual }
    remediation: "governance.policyAssignments is populated by the AzGovViz ingest step and has no field distinguishing Arc-scoped policies (guest configuration, Arc VM extension policies) from general assignments. Manually confirm Arc-connected machines are in scope for, and compliant with, the relevant Azure Policy initiatives."
    manual: true
